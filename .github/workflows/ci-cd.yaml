name: Loja Veloz CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Configuração do Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 3. Login no Docker Hub
        # Só faz login se não for um PR de fork, para evitar problemas de segurança
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 4 e 5. Build e Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: ${{ github.event_name != 'pull_request' }}
          tags: zPirataa/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 4 e 5. Build e Push Serviço de Pedidos
        uses: docker/build-push-action@v5
        with:
          context: ./servico-pedidos
          push: ${{ github.event_name != 'pull_request' }}
          tags: zPirataa/servico-pedidos:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 4 e 5. Build e Push Serviço de Pagamentos
        uses: docker/build-push-action@v5
        with:
          context: ./servico-pagamentos
          push: ${{ github.event_name != 'pull_request' }}
          tags: zPirataa/servico-pagamentos:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 4 e 5. Build e Push Serviço de Estoque
        uses: docker/build-push-action@v5
        with:
          context: ./servico-estoque
          push: ${{ github.event_name != 'pull_request' }}
          tags: zPirataa/servico-estoque:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 6. (Opcional) Executar testes simples
        run: |
          echo "==> Executando testes nos microsserviços..."
          echo "Aqui você pode rodar os testes da sua aplicação. Exemplo:"
          echo "npm test dentro das pastas dos serviços."
          # cd servico-pedidos && npm run test

      - name: Setup kubectl
        # Só aplicamos no Kubernetes se for push na branch main
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: 7. Aplicar manifestos Kubernetes
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          # Salvando o kubeconfig a partir de uma secret
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          
          # 1º Criamos o namespace primeiro
          kubectl apply -f k8s/namespace.yaml
          
          # 2º Aplicamos o restante da pasta k8s
          kubectl apply -f k8s/
          
          # (Opcional) Reiniciar os deployments para garantir que peguem as imagens "latest"
          kubectl rollout restart deployment api-gateway -n loja-veloz
          kubectl rollout restart deployment servico-pedidos -n loja-veloz
          kubectl rollout restart deployment servico-pagamentos -n loja-veloz
          kubectl rollout restart deployment servico-estoque -n loja-veloz
